<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TAKEE Music Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">TAKEE</div>
    <div class="auth-subtitle">Sign in to your account</div>

    <!-- autocomplete="off" on the form prevents browser from filling username into email -->
    <div autocomplete="off">
      <div class="form-group">
        <label>Email Address</label>
        <input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>

    <button onclick="loginUser()" class="add-cart">Sign In →</button>

    <div class="auth-divider"><span>or</span></div>

    <div class="auth-footer">
      Don't have an account?
      <span class="auth-link" onclick="navigate('signup.html')">Create one →</span>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
