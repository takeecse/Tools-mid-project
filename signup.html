<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — TAKEE Music Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">TAKEE</div>
    <div class="auth-subtitle">Create your account</div>

    <!-- Key fix: autocomplete="off" at the wrapper level prevents browser autofill chaos -->
    <div autocomplete="off">

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>First Name</label>
          <input id="firstName" type="text" placeholder="John" autocomplete="given-name">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input id="lastName" type="text" placeholder="Doe" autocomplete="family-name">
        </div>
      </div>

      <!-- id="signupUsername" (not "username") prevents browser mapping email into this field -->
      <div class="form-group">
        <label>Username</label>
        <input id="signupUsername" type="text" placeholder="johndoe123" autocomplete="nickname">
      </div>

      <!-- id="signupEmail" (not "email") prevents conflict with browser autofill -->
      <div class="form-group">
        <label>Email Address</label>
        <input id="signupEmail" type="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input id="signupPassword" type="password" placeholder="Min. 6 characters" autocomplete="new-password">
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input id="confirmPassword" type="password" placeholder="Repeat password" autocomplete="new-password">
      </div>

      <!-- Dynamic captcha: question is injected by auth.js generateCaptcha() -->
      <div class="form-group">
        <label id="captchaLabel">Loading captcha...</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="captchaInput" type="text" placeholder="Enter answer" autocomplete="off"
            style="flex:1">
          <button type="button" onclick="generateCaptcha()" title="New question"
            style="background:var(--card);border:1px solid var(--border);color:var(--muted);
                   padding:12px 14px;border-radius:var(--radius);cursor:pointer;font-size:16px;
                   transition:0.2s;flex-shrink:0"
            onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'"
            onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
            🔄
          </button>
        </div>
      </div>

    </div><!-- end autocomplete="off" wrapper -->

    <button onclick="signupUser()" class="add-cart">Create Account →</button>

    <div class="auth-divider"><span>or</span></div>

    <div class="auth-footer">
      Already have an account?
      <span class="auth-link" onclick="navigate('login.html')">Sign in →</span>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
